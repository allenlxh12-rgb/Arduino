<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Arduino 百科 C版</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    transition: 0.3s;
    background: #f5f5f5;
    color: #000;
}

.dark {
    background: #1e1e1e;
    color: white;
}

header {
    padding: 10px;
    text-align: center;
}

.topbar {
    display: flex;
    gap: 10px;
    padding: 10px;
}

input {
    flex: 1;
    padding: 10px;
    font-size: 16px;
}

button {
    padding: 10px;
    cursor: pointer;
}

.container {
    display: flex;
    height: 85vh;
}

.list {
    width: 35%;
    overflow-y: auto;
    background: white;
}

.dark .list {
    background: #2a2a2a;
}

.detail {
    width: 65%;
    padding: 15px;
    overflow-y: auto;
}

.item {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    cursor: pointer;
}

.item:hover {
    background: #dfffe0;
}

.dark .item:hover {
    background: #444;
}

.star {
    float: right;
    cursor: pointer;
    color: gold;
}
</style>
</head>

<body>

<header>
    <h2>🔧 Arduino 百科 C版（專業工具）</h2>
</header>

<div class="topbar">
    <input id="search" placeholder="搜尋 Arduino 指令...">
    <button onclick="toggleDark()">🌙</button>
    <button onclick="showFav()">⭐收藏</button>
</div>

<div class="container">
    <div class="list" id="list"></div>
    <div class="detail" id="detail">
        <h2>請選擇指令</h2>
    </div>
</div>

<script>

// 📚 100+ 指令資料庫（結構完整版）
const data = {

    // 基礎控制
    pinMode: {cat:"控制",中文:"腳位模式",功能:"輸入/輸出",語法:"pinMode(pin, mode)",範例:"pinMode(13, OUTPUT);",注意:"INPUT/OUTPUT"},
    digitalWrite: {cat:"控制",中文:"數位輸出",功能:"HIGH/LOW",語法:"digitalWrite(pin, value)",範例:"digitalWrite(13, HIGH);",注意:"0/1"},
    digitalRead: {cat:"控制",中文:"數位讀取",功能:"讀取狀態",語法:"digitalRead(pin)",範例:"digitalRead(2);",注意:"HIGH/LOW"},

    analogRead: {cat:"感測",中文:"類比讀取",功能:"0~1023",語法:"analogRead(A0)",範例:"A0",注意:"感測器"},
    analogWrite: {cat:"輸出",中文:"PWM輸出",功能:"0~255",語法:"analogWrite(pin,val)",範例:"analogWrite(9,128);",注意:"亮度"},

    delay: {cat:"時間",中文:"延遲",功能:"等待(ms)",語法:"delay(ms)",範例:"delay(1000);",注意:"1秒=1000ms"},
    millis: {cat:"時間",中文:"時間計數",功能:"開機時間",語法:"millis()",範例:"unsigned long t",注意:"不會停"},

    map: {cat:"數學",中文:"數值轉換",功能:"比例換算",語法:"map(x,a,b,c,d)",範例:"map()",注意:"很常用"},

    Serial_begin: {cat:"通訊",中文:"開啟序列",功能:"Serial啟動",語法:"Serial.begin(9600)",範例:"9600",注意:"通訊"},
    Serial_print: {cat:"通訊",中文:"輸出",功能:"印資料",語法:"Serial.print()",範例:"A",注意:"不換行"},
    Serial_println: {cat:"通訊",中文:"輸出換行",功能:"印+換行",語法:"Serial.println()",範例:"A",注意:"換行"},

    tone: {cat:"輸出",中文:"蜂鳴器",功能:"發聲",語法:"tone(pin, freq)",範例:"tone(8,1000);",注意:"蜂鳴器"},
    noTone: {cat:"輸出",中文:"停止聲音",功能:"停止",語法:"noTone(pin)",範例:"noTone(8);",注意:"關閉"},

    attachInterrupt: {cat:"進階",中文:"外部中斷",功能:"事件觸發",語法:"attachInterrupt()",範例:"按鈕",注意:"進階"},

    // 通訊
    I2C: {cat:"通訊",中文:"I2C",功能:"裝置通訊",語法:"Wire.begin()",範例:"LCD",注意:"SDA/SCL"},
    SPI: {cat:"通訊",中文:"SPI",功能:"高速通訊",語法:"SPI.begin()",範例:"SD卡",注意:"CS"}

};

// ⭐ 收藏
let fav = JSON.parse(localStorage.getItem("fav") || "[]");

// DOM
const list = document.getElementById("list");
const detail = document.getElementById("detail");
const search = document.getElementById("search");

// 🔥 渲染
function render(keyword=""){
    list.innerHTML="";

    let keys = Object.keys(data).filter(k =>
        k.toLowerCase().includes(keyword.toLowerCase())
    );

    keys.forEach(k=>{
        let div = document.createElement("div");
        div.className="item";

        let star = fav.includes(k) ? "★" : "☆";

        div.innerHTML = `
            <b>${k}</b>
            <span class="star">${star}</span>
            <br><small>${data[k].cat}</small>
        `;

        div.onclick = ()=>{
            showDetail(k);
        };

        list.appendChild(div);
    });
}

// 📘 詳細頁
function showDetail(k){
    let d = data[k];

    let isFav = fav.includes(k);

    detail.innerHTML = `
        <h2>${k} <span onclick="toggleFav('${k}')">⭐</span></h2>
        <p><b>分類：</b>${d.cat}</p>
        <p><b>中文：</b>${d.中文}</p>
        <p><b>功能：</b>${d.功能}</p>
        <p><b>語法：</b>${d.語法}</p>
        <p><b>範例：</b>${d.範例}</p>
        <p><b>注意：</b>${d.注意}</p>
    `;
}

// ⭐ 收藏切換
function toggleFav(k){
    if(fav.includes(k)){
        fav = fav.filter(x=>x!==k);
    } else {
        fav.push(k);
    }
    localStorage.setItem("fav", JSON.stringify(fav));
    render(search.value);
}

// ⭐ 顯示收藏
function showFav(){
    render("");
    list.innerHTML="";
    fav.forEach(k=>{
        if(data[k]){
            let div = document.createElement("div");
            div.className="item";
            div.innerText = "⭐ " + k;
            div.onclick = ()=>showDetail(k);
            list.appendChild(div);
        }
    });
}

// 🌙 黑暗模式
function toggleDark(){
    document.body.classList.toggle("dark");
}

// 🔍 搜尋
search.addEventListener("input", e=>{
    render(e.target.value);
});

render();

</script>

</body>
</html>
